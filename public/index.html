<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Sort — API Tester</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --black: #0d0d0f;
        --white: #e8e7e3;
        --accent: #7eb8d4;
        --muted: #5a5a5a;
        --border: #252528;
        --surface: #161618;
        --error: #d4614a;
        --success: #7eb8d4;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--black);
        color: var(--white);
        font-family: 'Syne', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow-x: hidden;
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 40px;
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 36px;
      }

      .badge {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        color: var(--accent);
        background: transparent;
        border: 1px solid var(--accent);
        padding: 4px 8px;
        border-radius: 2px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: 4px;
        opacity: 0.7;
      }

      h1 {
        font-size: 26px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      h1 span {
        display: block;
        color: var(--accent);
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 28px 0;
      }

      .field {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      input {
        width: 100%;
        background: var(--black);
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--white);
        font-family: 'Space Mono', monospace;
        font-size: 13px;
        padding: 12px 14px;
        transition: border-color 0.15s;
        outline: none;
      }

      input::placeholder {
        color: #2e2e32;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(126, 184, 212, 0.07);
      }

      .btn {
        width: 100%;
        padding: 13px 20px;
        border: none;
        border-radius: 2px;
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.15s, opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn:disabled { opacity: 0.35; cursor: not-allowed; }

      .btn-primary {
        background: var(--accent);
        color: var(--black);
      }

      .btn-primary:hover:not(:disabled) {
        opacity: 0.85;
      }

      .btn-secondary {
        background: transparent;
        color: var(--white);
        border: 1px solid var(--border);
        margin-top: 12px;
      }

      .btn-secondary:hover:not(:disabled) {
        border-color: #3a3a3e;
      }

      .result-box {
        margin-top: 24px;
        background: var(--black);
        border: 1px solid var(--border);
        border-radius: 2px;
        overflow: hidden;
        display: none;
      }

      .result-box.show { display: block; }

      .result-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }

      .result-content {
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        color: var(--accent);
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-all;
        line-height: 1.7;
      }

      .toast {
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 2px;
        font-size: 11px;
        font-family: 'Space Mono', monospace;
        display: none;
        letter-spacing: 0.02em;
      }

      .toast.show { display: block; }

      .toast.error {
        background: rgba(212, 97, 74, 0.08);
        border: 1px solid rgba(212, 97, 74, 0.2);
        color: var(--error);
      }

      .toast.success {
        background: rgba(126, 184, 212, 0.06);
        border: 1px solid rgba(126, 184, 212, 0.15);
        color: var(--accent);
      }

      .spinner {
        width: 13px;
        height: 13px;
        border: 1.5px solid rgba(126, 184, 212, 0.15);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
        display: inline-block;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 480px) {
        .card { padding: 28px 20px; }
        h1 { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-header">
        <div>
          <h1>Word<span>Sort.</span></h1>
        </div>
        <span class="badge">API Tester</span>
      </div>

      <div class="field">
        <label>API Endpoint</label>
        <input type="url" id="apiUrl" value="https://oneeleven-production.up.railway.app" placeholder="https://api.example.com" />
      </div>

      <div class="field">
        <label>Word to Sort</label>
        <input type="text" id="data" placeholder="e.g. hurricane" autocomplete="off" />
      </div>

      <button class="btn btn-primary" onclick="testSort()" id="sortBtn">
        Run Sort
      </button>

      <div class="result-box" id="result">
        <div class="result-label">Response</div>
        <div class="result-content" id="resultContent"></div>
      </div>

      <div class="toast" id="toast"></div>

      <div class="divider"></div>

      <div class="field">
        <label>Email (optional)</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <button class="btn btn-secondary" onclick="submitResults()" id="submitBtn">
        Submit Results
      </button>
    </div>

    <script>
      let lastSortResult = null;

      function showToast(msg, type = 'error') {
        const t = document.getElementById('toast');
        t.className = `toast show ${type}`;
        t.textContent = msg;
      }

      function hideToast() {
        document.getElementById('toast').className = 'toast';
      }

      async function testSort() {
        const apiUrl = document.getElementById('apiUrl').value.trim();
        const data   = document.getElementById('data').value.trim();
        const btn    = document.getElementById('sortBtn');

        hideToast();

        if (!apiUrl) return showToast('API URL is required.');
        if (!data)   return showToast('Please enter a word to sort.');

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span>Sorting…`;

        try {
          const res = await fetch(`${apiUrl}/sort-word`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data }),
          });

          const result = await res.json();
          if (!res.ok) throw new Error(result.error || 'Request failed');

          lastSortResult = result;
          document.getElementById('resultContent').textContent = JSON.stringify(result, null, 2);
          document.getElementById('result').classList.add('show');
          showToast('Sort completed successfully.', 'success');
        } catch (err) {
          showToast(err.message || 'Could not connect to API.');
          document.getElementById('result').classList.remove('show');
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Run Sort';
        }
      }

      function submitResults() {
        const email = document.getElementById('email').value.trim();
        hideToast();
        if (!email)           return showToast('Please enter an email address.');
        if (!lastSortResult)  return showToast('Run a sort first before submitting.');
        showToast(`Submitted — ${email}`, 'success');
        console.log('Sort result:', lastSortResult);
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.activeElement.id !== 'email') {
          testSort();
        }
      });
    </script>
  </body>
</html>
